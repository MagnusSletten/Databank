name: Ruff
on:
  pull_request:
  push:
    branches: [ ruff-tests ]
  workflow_dispatch: 

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install "ruff>=0.5"
      - name: Lint
        run: ruff check . --output-format=github
      - name: Format check
        run: ruff format --check .